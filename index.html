<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primary Source Palooza! Your Guide to Working with Primary Sources</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    /* ── Variables ───────────────────────────────────────── */
    :root {
      --parchment:     #f3e8c4;
      --parchment-mid: #e6d09a;
      --parchment-drk: #cfa85c;
      --ink:           #1a0f06;
      --ink-mid:       #3a2210;
      --rubric:        #8b1a1a;
      --gold:          #c8a030;
      --azure:         #1e3d6b;
      --verdigris:     #3d6b4a;
    }

    /* ── Body ────────────────────────────────────────────── */
    body {
      font-family: 'Crimson Text', Georgia, serif;
      background: var(--parchment-drk);
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      background: var(--ink);
      color: var(--parchment);
      text-align: center;
      padding: 0.5rem 1rem 0.45rem;
      border-bottom: 3px solid var(--gold);
      flex-shrink: 0;
    }
    header h1 {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 1.35rem;
      letter-spacing: 0.07em;
      line-height: 1.2;
    }
    header .subtitle {
      font-style: italic;
      font-size: 0.85rem;
      color: var(--parchment-mid);
      margin-top: 0.1rem;
      letter-spacing: 0.02em;
    }

    /* ── Workspace ───────────────────────────────────────── */
    .workspace { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      width: 272px;
      flex-shrink: 0;
      background: var(--parchment);
      border-right: 2px solid var(--parchment-drk);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-inner {
      flex: 1;
      overflow-y: auto;
      padding: 0.7rem 0.65rem 0.5rem;
    }
    .sidebar-inner::-webkit-scrollbar { width: 5px; }
    .sidebar-inner::-webkit-scrollbar-track { background: var(--parchment-mid); }
    .sidebar-inner::-webkit-scrollbar-thumb { background: var(--parchment-drk); border-radius: 2px; }

    .sidebar-label {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 0.75rem;
      text-align: center;
      color: var(--rubric);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--parchment-mid);
    }

    .doc-list { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; }

    .doc-item {
      cursor: pointer;
      padding: 0.42rem 0.55rem;
      border: 1px solid transparent;
      border-left: 3px solid transparent;
      display: flex;
      align-items: flex-start;
      gap: 0.45rem;
      transition: background 0.1s, border-color 0.1s;
      border-radius: 1px;
    }
    .doc-item:hover {
      background: var(--parchment-mid);
      border-left-color: var(--parchment-drk);
    }
    .doc-item.active {
      background: var(--ink);
      color: var(--parchment);
      border-color: var(--gold);
    }
    .doc-item.active .doc-num { color: var(--gold); }
    .doc-item:focus { outline: 2px solid var(--gold); outline-offset: -2px; }

    .doc-num {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 0.73rem;
      color: var(--rubric);
      min-width: 1.7rem;
      padding-top: 0.1rem;
      flex-shrink: 0;
    }
    .doc-title { font-size: 0.93rem; line-height: 1.3; }

    .sidebar-footer {
      flex-shrink: 0;
      height: 88px;
      position: relative;
      border-top: 1px solid var(--parchment-mid);
      background: var(--parchment);
      overflow: hidden;
    }

    /* ── Viewer panel ────────────────────────────────────── */
    .viewer-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #5a4a38;
    }

    .viewer-bar {
      background: var(--ink-mid);
      color: var(--parchment);
      padding: 0.42rem 0.85rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--gold);
      flex-shrink: 0;
      gap: 1rem;
    }
    .viewer-doc-title {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .viewer-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

    .btn {
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 0.85rem;
      padding: 0.22rem 0.65rem;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--parchment);
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.1s, color 0.1s;
    }
    .btn:hover { background: var(--gold); color: var(--ink); }
    .btn:focus { outline: 2px solid var(--gold); outline-offset: 1px; }

    .viewer-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--parchment-mid);
      gap: 1.1rem;
      padding: 2rem;
      text-align: center;
    }
    .viewer-placeholder p {
      font-family: 'IM Fell English', Georgia, serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--ink-mid);
    }
    .scene-float { animation: float 5s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }

    .viewer-frame { flex: 1; border: none; width: 100%; display: block; }
  </style>
</head>

<script>
  const DOCUMENTS = [
    { title: "Art or Artifact",                       file: "Art or Artifact.pdf" },
    { title: "Audio",                                 file: "Audio.pdf" },
    { title: "Cartoon",                               file: "Cartoon.pdf" },
    { title: "Government or Legal Document",          file: "Government or Legal Document.pdf" },
    { title: "Letter or Telegram",                    file: "Letter or Telegram.pdf" },
    { title: "Map",                                   file: "Map.pdf" },
    { title: "Newspaper",                             file: "Newspaper.pdf" },
    { title: "Oral History",                          file: "Oral History.pdf" },
    { title: "Photograph",                            file: "Photograph.pdf" },
    { title: "Speech",                                file: "Speech.pdf" },
    { title: "Statistics",                            file: "Statistics.pdf" },
    { title: "Video",                                 file: "Video.pdf" },
    { title: "Working with Primary Sources Combined", file: "Working with Primary Sources Combined.pdf" },
    { title: "Written Document",                      file: "Written Document.pdf" },
  ];
  const PDF_FOLDER = "Working with Primary Sources/";
  // =========================================================

  const ROMAN = [
    "I","II","III","IV","V","VI","VII","VIII",
    "IX","X","XI","XII","XIII","XIV","XV",
    "XVI","XVII","XVIII","XIX","XX"
  ];
  let currentIndex = null;

  function buildList() {
    const list = document.getElementById('doc-list');
    DOCUMENTS.forEach((doc, i) => {
      const li      = document.createElement('li');
      li.className  = 'doc-item';
      li.tabIndex   = 0;
      li.innerHTML  = `<span class="doc-num">${ROMAN[i] || (i + 1)}.</span>`
                    + `<span class="doc-title">${doc.title}</span>`;
      li.addEventListener('click',   ()  => openDoc(i));
      li.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') openDoc(i); });
      list.appendChild(li);
    });
  }

  function openDoc(index) {
    document.querySelectorAll('.doc-item').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });
    currentIndex = index;
    const doc = DOCUMENTS[index];

    document.getElementById('viewer-bar').style.display          = 'flex';
    document.getElementById('viewer-doc-title').textContent      = doc.title;
    document.getElementById('viewer-placeholder').style.display  = 'none';

    const frame     = document.getElementById('viewer-frame');
    frame.src       = PDF_FOLDER + doc.file;
    frame.style.display = 'block';
  }

  function openCurrent() {
    if (currentIndex === null) return;
    window.open(PDF_FOLDER + DOCUMENTS[currentIndex].file, '_blank');
  }

  buildList();
</script>
</body>
</html>
